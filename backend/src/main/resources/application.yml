server:
  port: ${PORT:8081}

spring:
  application:
    name: khanKiddo-v2
  config:
    import: optional:classpath:scoring/performance-scoring.yml

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/khan_kiddo_dev?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

app:
  auth:
    # 生产环境务必通过环境变量 JWT_SECRET 覆盖（至少 32 字符）
    jwt-secret: ${JWT_SECRET:khankiddo-v2-dev-jwt-secret-change-me-in-production}
    jwt-expiration-hours: ${JWT_EXPIRATION_HOURS:168}
  conversation-analysis:
    min-content-length: 10
    max-content-length: 10000
    batch-threshold: 15
    batch-size: 5
    batch-concurrent-limit: 5
    # Stage 1 对话分离：Flash 模型 + 低 temperature（对齐 v1）
    separation-model-name: ${AI_SEPARATION_MODEL:doubao-seed-1-6-flash-250828}
    separation-temperature: ${AI_SEPARATION_TEMPERATURE:0.3}

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.khankiddo.learning.model
  configuration:
    map-underscore-to-camel-case: true

# LangChain4j — 火山方舟豆包（OpenAI Chat Completions 兼容）
# 环境变量与 v1 保持一致：AI_API_KEY、AI_BASE_URL、AI_MODEL
langchain4j:
  open-ai:
    chat-model:
      api-key: ${AI_API_KEY:}
      base-url: ${AI_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}
      model-name: ${AI_MODEL:doubao-seed-1-8-251228}
      temperature: ${AI_TEMPERATURE:0.4}
      max-tokens: ${AI_MAX_TOKENS:10240}
      timeout: ${AI_TIMEOUT_MS:120s}
      max-retries: ${AI_MAX_RETRIES:3}
      log-requests: true
      log-responses: true
      return-thinking: false
      custom-parameters:
        thinking:
          type: disabled
    streaming-chat-model:
      api-key: ${AI_API_KEY:}
      base-url: ${AI_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}
      model-name: ${AI_MODEL:doubao-seed-1-8-251228}
      temperature: ${AI_TEMPERATURE:0.4}
      max-tokens: ${AI_MAX_TOKENS:10240}
      timeout: ${AI_TIMEOUT_MS:120s}
      max-retries: ${AI_MAX_RETRIES:3}
      log-requests: true
      log-responses: true
      return-thinking: false
      custom-parameters:
        thinking:
          type: disabled
